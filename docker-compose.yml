services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: trycue
      POSTGRES_USER: trycue
      POSTGRES_PASSWORD: trycue
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trycue -d trycue"]
      interval: 3s
      timeout: 3s
      retries: 20
    volumes:
      - trycue-postgres:/var/lib/postgresql/data

volumes:
  trycue-postgres:
