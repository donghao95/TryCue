name: CI

on:
  pull_request:
    branches:
      - main
    # 纯文档/工具产物改动不触发 CI。
    # 已确认无源代码 import/readFile 读取 .md 文件，docs 下也只有文档资源。
    # .codex/.claude-tmp/.workbuddy 等已被 .gitignore 忽略，不会进 PR diff，无需在此重复。
    paths-ignore:
      - '**.md'
      - 'docs/**'
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'

# 同一分支/PR 连续 push 时取消旧的 CI run，避免排队浪费 runner 分钟
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.4.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      # PR CI 只跑 smoke 集成测试（5 个关键路径用例），不跑完整 test:integration。
      # 原因：GitHub runner 跑不动 SQLite + 高并发 audience generation + 完整 93 个
      # 集成测试的组合，会大面积 Socket timeout / Timed out waiting for condition。
      # 该结论由 PR14 验证并固化，完整 integration 留给本地 `pnpm verify` 和未来
      # 可能的 nightly workflow。如需改回完整 integration，请先确认 runner 规格和
      # 超时配置能承载，避免重蹈 2eb6428 把 smoke 改回 full 后 CI 立即全红的覆辙。
      - name: Smoke integration test
        run: pnpm test:integration:smoke

      - name: Build
        run: pnpm build

      - name: Production startup smoke
        env:
          DATABASE_URL: file:./data/trycue_test.db
          APP_ENV: smoke
          LLM_CONFIG_PATH: config/llm.example.yaml
          ENABLE_SCHEDULER: "false"
          LOG_LEVEL: warn
        run: |
          node apps/api/dist/index.js &
          PID=$!
          for i in $(seq 1 15); do
            if curl -sf http://localhost:2671/health >/dev/null 2>&1; then
              echo "Production startup smoke passed"
              kill $PID 2>/dev/null || true
              wait $PID 2>/dev/null || true
              exit 0
            fi
            sleep 1
          done
          echo "Production startup smoke failed"
          kill $PID 2>/dev/null || true
          wait $PID 2>/dev/null || true
          exit 1
