name: CI

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.4.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Smoke integration test
        run: pnpm test:integration:smoke

      - name: Build
        run: pnpm build

      - name: Production startup smoke
        env:
          DATABASE_URL: file:./data/trycue_test.db
          APP_ENV: test
          LLM_CONFIG_PATH: config/llm.example.yaml
        run: |
          node apps/api/dist/index.js &
          PID=$!
          for i in $(seq 1 15); do
            if curl -sf http://localhost:4000/health >/dev/null 2>&1; then
              echo "Production startup smoke passed"
              kill $PID 2>/dev/null || true
              wait $PID 2>/dev/null || true
              exit 0
            fi
            sleep 1
          done
          echo "Production startup smoke failed"
          kill $PID 2>/dev/null || true
          wait $PID 2>/dev/null || true
          exit 1
