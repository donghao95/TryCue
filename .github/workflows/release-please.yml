name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v5
        with:
          # 单一 release：所有包作为一个整体发版，不拆分为 @trycue/api、@trycue/web 等
          # 因为所有包都是 private，不会发布到 npm，release-please 只负责：
          # 1. 维护 release PR（自动 bump 版本号 + 更新 CHANGELOG）
          # 2. 合并 release PR 后打 git tag + 创建 GitHub Release
          release-type: node
          # 不在 tag 里包含组件名（@trycue/api-v0.1.0 → v0.1.0）
          include-component-in-tag: false
          # 用 PAT 而非默认 GITHUB_TOKEN：GITHUB_TOKEN 创建的 tag 不会触发其他 workflow
          # （GitHub 防递归规则），导致 docker.yml 监听的 push.tags:v* 永远不触发。
          # PAT 创建的 tag 能正常触发 docker 镜像构建。
          token: ${{ secrets.GH_PAT }}
