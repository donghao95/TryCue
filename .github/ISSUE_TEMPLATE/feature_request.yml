name: 功能提议
description: 提议一个新功能或改进
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你的功能提议！请说明使用场景和动机，避免直接堆功能。
        TryCue V1 是单版本 AI 试映，不接真实社交平台，不做多版本 PK。

  - type: textarea
    id: problem
    attributes:
      label: 要解决的问题
      description: 这个功能解决什么具体问题？在什么场景下会遇到？
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 期望的方案
      description: 你希望 TryCue 怎么做？
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 考虑过的替代方案
      description: 有没有其他实现方式？为什么不选它们？

  - type: dropdown
    id: area
    attributes:
      label: 影响范围
      multiple: true
      options:
        - 内容创建
        - AI 观众生成
        - 实时试映现场
        - 观众行为模拟
        - 试映报告
        - 前端 UI / 交互
        - API / 共享契约
        - 数据库 / 持久化
        - Agent 运行时 / 调度器
        - 文档
        - 构建 / CI / 部署
        - 其他
    validations:
      required: true

  - type: checkboxes
    id: scope
    attributes:
      label: 范围自检
      options:
        - label: 我已确认这个功能在 TryCue V1 范围内（单版本试映，非多版本 PK，非真实平台对接）
          required: true
        - label: 我已阅读 README 的「当前状态」和「开源边界」部分
          required: false
